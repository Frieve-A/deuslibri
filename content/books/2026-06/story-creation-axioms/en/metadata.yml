summary: "A rigorous work of narrative craft presenting eighteen axioms for building stories from changes in meaning, value conflict, and the cost of choice, rather than from the multiplication of events."
description: |
  Axioms of Story Creation reframes story as the process by which a value-bearing subject makes an irreversible choice in a constrained world and rewrites meaning through the cost of that choice.

  It argues that incidents, settings, and twists do not deepen a work by accumulation. Depth emerges instead through state transitions of meaning, value conflict, character choice, the world as a pressure apparatus, causality, reader cognition, aesthetics, and revision.

  Instead of offering fixed templates such as three-act structure or foreshadowing, the book presents eighteen axioms as a foundation for independent judgment: Is this scene necessary? Does this enemy expose the protagonist? Does this first-half success create the ordeal of the second half?

  Frieve-A 2026
