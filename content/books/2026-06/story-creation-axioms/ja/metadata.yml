description: |
  『物語創造の公理』は、物語を「価値を持つ主体が、制約された世界で不可逆の選択を行い、その代償によって意味を更新する過程」として捉え直すための創作論です。

  事件、設定、どんでん返しを増やしても作品が深くならない理由を、意味の状態遷移、価値衝突、人物の選択、世界の制約、因果、読者認知、美学、改稿の観点から分解します。

  本書は、三幕構成や伏線のような型そのものではなく、「この場面は必要か」「この敵は主人公を暴いているか」「この成功は後半の地獄を生むか」といった判断を自力で下すための足場を、十八の公理として提示します。

  Frieve-A 2026
